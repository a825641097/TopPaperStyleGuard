name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install .
      - run: python -m unittest discover -s tests
      - run: tpsg build examples/corpus --profile-out /tmp/topstyle.profile.json --guard-out /tmp/topstyle.guard.json --common-doc-threshold 2
      - run: tpsg audit examples/drafts/introduction.md --profile /tmp/topstyle.profile.json --guard /tmp/topstyle.guard.json --ignore-common-ngrams --fail-on none
